<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charSet="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>打水计算器 | shanhai.org</title>
    <meta name="description" content="体育资产对冲本金分配与收益精算工具"/>
    <link rel="icon" href="/icon.png" sizes="32x32" type="image/png"/>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.0.3/dist/fonts/geist-sans/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.0.3/dist/fonts/geist-mono/style.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Geist', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['"Geist Mono"', 'ui-monospace', 'monospace'],
                    },
                    colors: {
                        status: {
                            safe: '#10b981',
                            warn: '#f59e0b',
                            danger: '#ef4444'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #fafafa;
            color: #171717;
            background-image: radial-gradient(#e5e5e5 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input[type="number"] {
            -moz-appearance: textfield;
        }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .rebate-input {
            border-bottom: 1px solid #a3a3a3;
            transition: border-color 0.2s;
        }
        .rebate-input:focus {
            border-bottom: 1px solid #000000;
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen relative">
    
    <header class="bg-white border-b-2 border-black sticky top-0 z-50">
        <div class="px-4 md:px-8 h-14 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="tools.html" class="flex items-center justify-center text-black hover:text-gray-500 transition-colors font-bold text-lg">
                    ←
                </a>
                <h1 class="text-sm md:text-base font-bold tracking-widest uppercase">Hedge_Calc</h1>
            </div>
            
            <div class="flex items-center gap-6 font-mono text-xs md:text-sm font-bold">
                <div class="flex items-center gap-1 group">
                    <span class="text-gray-500">返水A:</span>
                    <input type="number" id="rebateA" value="0.10" step="0.01" class="rebate-input w-12 bg-transparent outline-none text-center text-black" oninput="calculateHedge()">
                    <span class="text-gray-500">%</span>
                </div>
                <div class="flex items-center gap-1 group">
                    <span class="text-gray-500">返水B:</span>
                    <input type="number" id="rebateB" value="0.00" step="0.01" class="rebate-input w-12 bg-transparent outline-none text-center text-black" oninput="calculateHedge()">
                    <span class="text-gray-500">%</span>
                </div>
            </div>
        </div>
    </header>

    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 opacity-[0.03] pointer-events-none select-none">
        <h1 class="text-[12vw] font-black font-mono tracking-tighter">SHANHAI</h1>
    </div>

    <main class="fixed bottom-4 left-4 md:bottom-8 md:left-8 w-[calc(100vw-2rem)] md:w-[380px] bg-white border-2 border-black shadow-[6px_6px_0_0_#000] z-40 flex flex-col">
        
        <div class="bg-black text-white px-4 py-2.5 flex justify-between items-center">
            <span class="font-mono text-xs font-bold tracking-widest">终端控制台 // 实时精算仪</span>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-status-safe animate-pulse"></span>
            </div>
        </div>

        <div class="p-5 space-y-5">
            <div>
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">A台下注金额 (Bet A)</label>
                <div class="flex items-center border border-black bg-neutral-50 px-3 py-2 focus-within:bg-white focus-within:shadow-[0_0_0_1px_#000] transition-all">
                    <span class="font-mono font-bold mr-2 text-black">¥</span>
                    <input type="number" id="betAmountA" value="10000" class="w-full bg-transparent outline-none font-mono font-bold text-xl text-black" oninput="calculateHedge()">
                </div>
            </div>

            <div class="flex gap-4">
                <div class="flex-1">
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">赔率 A (Odds)</label>
                    <input type="number" id="oddsA" value="1.98" step="0.01" class="w-full border border-black bg-neutral-50 px-3 py-2 font-mono font-bold text-lg text-black outline-none focus:bg-white focus:shadow-[0_0_0_1px_#000] transition-all" oninput="calculateHedge()">
                </div>
                <div class="flex-1">
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1.5 block">赔率 B (Odds)</label>
                    <input type="number" id="oddsB" value="2.05" step="0.01" class="w-full border border-black bg-neutral-50 px-3 py-2 font-mono font-bold text-lg text-black outline-none focus:bg-white focus:shadow-[0_0_0_1px_#000] transition-all" oninput="calculateHedge()">
                </div>
            </div>
        </div>

        <div class="border-t border-black bg-neutral-100 p-5 font-mono text-sm">
            <div class="space-y-3 mb-4">
                <div class="flex justify-between items-center">
                    <span class="text-xs text-neutral-500 font-bold">A 台下注:</span>
                    <span class="font-bold text-black text-base" id="outBetA">¥ 0.00</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-xs text-neutral-500 font-bold">B 台需补:</span>
                    <span class="font-bold text-black text-base bg-[#ffbd2e] px-1" id="outBetB">¥ 0.00</span>
                </div>
                <div class="flex justify-between items-center pt-3 mt-1 border-t border-gray-300">
                    <span class="text-xs text-neutral-500 font-bold">预期总派彩:</span>
                    <span class="font-bold text-black text-base" id="grossReturn">¥ 0.00</span>
                </div>
                <div class="flex justify-between items-center mt-1">
                    <span class="text-xs text-neutral-500 font-bold">返水利润:</span>
                    <span class="font-bold text-black text-xs" id="expectedRebate">¥ 0.00</span>
                </div>
            </div>

            <div class="mt-5 space-y-3 bg-white border border-black p-4">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-black flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-black"></span> A赢 净利
                    </span>
                    <span class="font-black text-lg" id="profitA">¥ 0.00</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-black flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-gray-400"></span> B赢 净利
                    </span>
                    <span class="font-black text-lg" id="profitB">¥ 0.00</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        function getEffectiveTurnover(betAmount, odds, isWin) {
            if (!isWin) return betAmount; 
            if (odds >= 2.0) return betAmount; 
            return betAmount * (odds - 1); 
        }

        function calculateHedge() {
            const inputBetA = parseFloat(document.getElementById('betAmountA').value) || 0;
            const oddsA = parseFloat(document.getElementById('oddsA').value) || 0;
            const oddsB = parseFloat(document.getElementById('oddsB').value) || 0;
            
            const rebateRateA = (parseFloat(document.getElementById('rebateA').value) || 0) / 100;
            const rebateRateB = (parseFloat(document.getElementById('rebateB').value) || 0) / 100;

            if (inputBetA <= 0 || oddsA <= 0 || oddsB <= 0) {
                resetOutputs();
                return;
            }

            const grossReturn = inputBetA * oddsA;     
            const betB = grossReturn / oddsB;          
            const totalCapital = inputBetA + betB;     

            // 场景 1: A 赢，B 输
            const turnoverA_Win = getEffectiveTurnover(inputBetA, oddsA, true);
            const turnoverB_Lose = getEffectiveTurnover(betB, oddsB, false);
            const rebateValA_Win = turnoverA_Win * rebateRateA;
            const rebateValB_Lose = turnoverB_Lose * rebateRateB;
            const totalRebateAWin = rebateValA_Win + rebateValB_Lose;
            const profitA = grossReturn - totalCapital + totalRebateAWin;

            // 场景 2: B 赢，A 输
            const turnoverB_Win = getEffectiveTurnover(betB, oddsB, true);
            const turnoverA_Lose = getEffectiveTurnover(inputBetA, oddsA, false);
            const rebateValB_Win = turnoverB_Win * rebateRateB;
            const rebateValA_Lose = turnoverA_Lose * rebateRateA;
            const totalRebateBWin = rebateValB_Win + rebateValA_Lose;
            const profitB = grossReturn - totalCapital + totalRebateBWin;

            // 更新 UI 资金部分
            document.getElementById('outBetA').innerText = '¥ ' + inputBetA.toFixed(2);
            document.getElementById('outBetB').innerText = '¥ ' + betB.toFixed(2);
            document.getElementById('grossReturn').innerText = '¥ ' + grossReturn.toFixed(2);
            
            // 更新返水利润
            let rebateText = '';
            if (Math.abs(totalRebateAWin - totalRebateBWin) < 0.01) {
                rebateText = '¥ ' + totalRebateAWin.toFixed(2);
            } else {
                rebateText = 'A赢 ¥' + totalRebateAWin.toFixed(2) + ' / B赢 ¥' + totalRebateBWin.toFixed(2);
            }
            document.getElementById('expectedRebate').innerText = rebateText;
            
            // 更新 UI 利润部分
            const profitAEl = document.getElementById('profitA');
            profitAEl.innerText = (profitA >= 0 ? '+' : '') + '¥ ' + profitA.toFixed(2);
            profitAEl.style.color = profitA >= 0 ? '#10b981' : '#ef4444';

            const profitBEl = document.getElementById('profitB');
            profitBEl.innerText = (profitB >= 0 ? '+' : '') + '¥ ' + profitB.toFixed(2);
            profitBEl.style.color = profitB >= 0 ? '#10b981' : '#ef4444';
        }

        function resetOutputs() {
            const defaultMoney = "¥ 0.00";
            document.getElementById('outBetA').innerText = defaultMoney;
            document.getElementById('outBetB').innerText = defaultMoney;
            document.getElementById('grossReturn').innerText = defaultMoney;
            document.getElementById('expectedRebate').innerText = defaultMoney;
            
            document.getElementById('profitA').innerText = defaultMoney;
            document.getElementById('profitA').style.color = "#171717";
            document.getElementById('profitB').innerText = defaultMoney;
            document.getElementById('profitB').style.color = "#171717";
        }

        window.onload = calculateHedge;
    </script>
</body>
</html>
